version: '3.8'

services:
  # Servicio de MinIO (Almacenamiento)
  minio:
    image: minio/minio
    container_name: minio-local
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: root1234
    command: server /data --console-address ":9001"
    restart: always

  # Servicio de Redis (Caché/Sesiones)
  redis:
    image: redis:alpine
    container_name: redis-local
    ports:
      - "6379:6379"
    command: redis-server --requirepass root
    restart: always